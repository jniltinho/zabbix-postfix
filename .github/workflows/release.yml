name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Set timezone to America/Sao_Paulo
        run: sudo timedatectl set-timezone America/Sao_Paulo
      - name: Verify timezone change
        run: timedatectl && date

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y upx

      - name: Install Project Dependencies
        run: make deps

      - name: Build Binaries
        run: make build

      - name: Package Binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          for BIN in pygtail pflogsumm check_mailq; do
            ARCHIVE="${BIN}_${VERSION}_linux_amd64.tar.gz"
            mkdir -p "release/${BIN}"
            cp "${BIN}/dist/${BIN}" "release/${BIN}/"
            tar -czvf "$ARCHIVE" -C "release/${BIN}" .
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pygtail_*_linux_amd64.tar.gz
            pflogsumm_*_linux_amd64.tar.gz
            check_mailq_*_linux_amd64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}