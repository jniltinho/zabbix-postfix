name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Set timezone to America/Sao_Paulo
        run: sudo timedatectl set-timezone America/Sao_Paulo
      - name: Verify timezone change
        run: timedatectl && date

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y upx

      - name: Install Project Dependencies
        run: make deps

      - name: Build Binaries
        run: make build

      - name: Package individual binary tarballs
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p dist
          for BIN in pflogsumm; do
            mkdir -p "release/${BIN}"
            cp "${BIN}/dist/${BIN}" "release/${BIN}/"
            tar -czvf "dist/${BIN}_${VERSION}_linux_amd64.tar.gz" -C "release/${BIN}" .
          done

      - name: Build combined install package tarball
        run: |
          bash scripts/make-install-package.sh --archive
          mv dist/zabbix-postfix-install.tar.gz \
             dist/zabbix-postfix_${{ steps.version.outputs.VERSION }}_linux_amd64.tar.gz

      - name: Build .deb, .rpm and .tar.gz via Docker
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          DOCKER_BUILDKIT=1 docker build \
            -f docs/Dockerfile \
            --target export-pkg \
            --build-arg VERSION="${VERSION}" \
            -o dist/ \
            .
          mv dist/zabbix-postfix.tar.gz \
             dist/zabbix-postfix_${VERSION}_pkg_linux_amd64.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/zabbix-postfix*.tar.gz
            dist/pflogsumm_*_linux_amd64.tar.gz
            dist/zabbix-postfix_*.deb
            dist/zabbix-postfix-*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
